<div class="dialog-shell">
  <div class="dialog-header">
    <div>
      <p class="dialog-kicker">Metadata setup</p>
      <h2>{{ title }}</h2>
      <p class="dialog-description">
        Use storage type to define the container category used by the laboratory,
        such as Freezer, Refrigerator, Shelf, or Cabinet.
      </p>
    </div>
  </div>

  <mat-divider></mat-divider>

  <form class="dialog-form" [formGroup]="form" (ngSubmit)="save()">
    <mat-form-field appearance="outline">
      <mat-label>Name</mat-label>
      <input
        matInput
        type="text"
        formControlName="name"
        maxlength="32"
        placeholder="For example: Refrigerator"
      />
      <mat-hint align="end">{{ nameControl?.value?.length || 0 }}/32</mat-hint>
      <mat-error *ngIf="nameControl?.hasError('required')">Name is required.</mat-error>
      <mat-error *ngIf="nameControl?.hasError('maxlength')">Use 32 characters or fewer.</mat-error>
    </mat-form-field>

    <div class="dialog-actions">
      <button mat-stroked-button type="button" (click)="close()">Close</button>
      <button mat-flat-button color="primary" type="submit" [disabled]="saving">
        <mat-icon *ngIf="!saving">save</mat-icon>
        <mat-spinner *ngIf="saving" diameter="20"></mat-spinner>
        {{ submitLabel }}
      </button>
    </div>
  </form>
</div>
