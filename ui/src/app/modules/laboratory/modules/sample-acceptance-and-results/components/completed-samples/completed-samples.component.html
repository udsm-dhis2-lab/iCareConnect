<div
  class="w-100"
  *ngIf="{
    providerDetails: providerDetails$ | async
  } as params"
>
  <mat-progress-bar
    mode="indeterminate"
    *ngIf="!params?.providerDetails"
  ></mat-progress-bar>
  <div class="loading-overlay" *ngIf="saving">
    <div class="text-center">
      <div>Saving ....</div>
      <div class="mt-3 d-flex justify-content-center w-100">
        <mat-spinner diameter="50" strokeWidth="2"></mat-spinner>
      </div>
    </div>
  </div>
  <div *ngIf="params?.providerDetails">
    Lorem ipsum dolor sit amet consectetur adipisicing elit. Sit officia incidunt nihil quasi quos nesciunt repellendus nostrum similique nisi eum aperiam vitae, eaque delectus suscipit explicabo blanditiis, dicta dignissimos illo!
    <app-shared-samples-list
      [tabType]="'completed-samples'"
      [samples]="params?.completedSamples"
      [LISConfigurations]="LISConfigurations"
      [labSamplesDepartments]="labSamplesDepartments"
      (selectedSampleDetails)="
        onGetSelectedSampleDetails($event, params?.providerDetails)
      "
      [category]="'RESULT_AUTHORIZATION'"
      [hasStatus]="'YES'"
      [showLegend]="true"
      [datesParameters]="datesParameters"
      [excludeAllocations]="true"
      [sampleTypes]="sampleTypes"
      [codedSampleRejectionReasons]="codedSampleRejectionReasons"
    ></app-shared-samples-list>
  </div>
</div>
