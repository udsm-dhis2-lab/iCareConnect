@if({
formId: formId,
provider: provider$ | async,
currentUser: currentUser$ | async
}; as params){

<app-sample-referral-form 
    [formId]="formId"
    [haveThisForm]="false"
    [withOrderType]="true"
    [combineWithOr]="false"
    [saveButtonText]="'Save Transport Information'"
    (saveForm)="onSaveTransportInformation($event)"></app-sample-referral-form>
}
