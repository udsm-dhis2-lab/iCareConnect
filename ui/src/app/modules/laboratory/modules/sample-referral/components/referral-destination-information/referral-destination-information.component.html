@if({
    formId: formId,
    provider: provider$ | async,
    currentUser: currentUser$ | async
}; as params){

    @if(loading){
        <mat-progress-bar mode="indeterminate"></mat-progress-bar>
    } @else {
        <app-sample-referral-form 
            [formId]="formId"
            [haveThisForm]="false"
            [withOrderType]="true"
            [combineWithOr]="false"
            [saveButtonText]="'Save Destination Information'"
            (saveForm)="onSaveDestinationInformation($event)"></app-sample-referral-form>
    }
}
