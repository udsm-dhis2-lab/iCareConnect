@if({
    formId: formId,
}; as params){

    @if(!params?.formId){
        <mat-progress-bar mode="indeterminate"></mat-progress-bar>
    } @else {
        <div class="row">
            <div class="col-12">
                <app-multiple-results-entry 
                [options]="options"
                [label]="'Select Samples'"
                [noEntriesFoundLabel]="'No samples found!'"
                [loading]="loadingOptions"
                (loadMore)="onLoadMore()"
                (searchChange)="onSearchChange($event)"
                (selectedList)="onSelection($event)"
                ></app-multiple-results-entry>
            </div>
            <div class="col-12">
                <app-render-openmrs-form 
                    [formId]="formId"
                    [colClass]="'col-md-12 col-sm-12 col-lg-12'"
                    (formDataUpdate)="onFormUpdate($event, formId)"></app-render-openmrs-form>
            </div>
        </div>
    }
}
