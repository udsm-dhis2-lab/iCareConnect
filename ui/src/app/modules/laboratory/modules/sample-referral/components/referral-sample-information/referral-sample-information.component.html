@if({
    formId: formId,
    provider: provider$ | async,
    currentUser: currentUser$ | async
}; as params){

    @if(loading){
        <mat-progress-bar mode="indeterminate"></mat-progress-bar>
    } @else {

        <app-sample-referral-form
            [formId]="formId"
            [haveThisForm]="false"
            [withOrderType]="false"
            [combineWithOr]="true"
            [saveButtonText]="'Save Sample Information'"
            (saveForm)="onSaveSampleInformation($event)"
        ></app-sample-referral-form>
    }
}
