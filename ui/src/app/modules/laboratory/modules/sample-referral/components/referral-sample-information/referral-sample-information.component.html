@if({
    formId: formId,
    provider: provider$ | async,
    currentUser: currentUser$ | async
}; as params){
    @if(loading){
        <mat-progress-bar mode="indeterminate"></mat-progress-bar>
    } @else {
        <app-sample-referral-form
            [formId]="formId"
            [haveThisForm]="false"
            [withOrderType]="true"
            [combineWithOr]="false"
            [showMarkedOnlyField]="true"
            [saveButtonText]="'Save Sample Information'"
            [observations]="observations"
            [selectedSample]="selectedSample"
            (saveForm)="onSaveSampleInformation($event)"
            (stepComplete)="stepComplete.emit()"
        ></app-sample-referral-form>
    }
}
