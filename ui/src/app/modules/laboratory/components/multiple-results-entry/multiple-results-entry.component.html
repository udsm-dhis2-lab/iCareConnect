<mat-form-field class="w-100" appearance="outline">
  @if(label){
  <mat-label>{{ label }}</mat-label>
  }
  <mat-select [formControl]="listMultiCtrl" placeholder="" [multiple]="true"
    panelClass="infinite-scroll-panel"
    (selectionChange)="getSelectedValues($event)" #multiSelect>
    <mat-option>
      <ngx-mat-select-search [noEntriesFoundLabel]="noEntriesFoundLabel" placeholderLabel="Search" [formControl]="listMultiFilterCtrl" ></ngx-mat-select-search>
    </mat-option>
    <mat-option *ngFor="let item of filteredMultiList | async" [value]="item">
      {{ item?.name }}
    </mat-option>
    <mat-option *ngIf="loading" disabled>
      <mat-spinner diameter="24"></mat-spinner>
    </mat-option>
  </mat-select>
</mat-form-field>
